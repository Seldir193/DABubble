



<div class="container">
    <div class="close-dialog">
      <img src="assets/img/tag-black.png" alt="Tag Icon" />
      <h1>{{ channelName }}</h1>
      <div class="close-pic-box" (click)="onCancel()">
        <img  src="assets/img/close.png" alt="Close" />
      </div>
    </div>
  
   
    <div class="channel-box" [ngClass]="{ 'hide-border': isEditingName, 'show-border': !isEditingName }">
        <div class="edit-box">
          <div class="box-container">
            <div class="header-button-box">
              <label for="channelName" [ngClass]="{ 'move-left': isEditingName }">Channel-Name</label>
              <div (click)="toggleEditingName()" class="profil-settings-button"
                   [ngClass]="{ 'move-right': isEditingName, 'move-initial': !isEditingName }">
                {{ isEditingName ? 'Speichern' : 'Bearbeiten' }}
              </div>
            </div>
  
            <div class="channel-name-box">
                <span class="input-icon">#</span>
                <h1 *ngIf="!isEditingName">{{ channelName }}</h1>
                <input *ngIf="isEditingName"
                       id="channelName"
                       [placeholder]="channelName || 'Channel Name bearbeiten'"
                       [(ngModel)]="editedChannelName"
                       class="visible" />
              </div>
            </div>
          </div>
        </div>
  
        <div class="channel-box" [ngClass]="{ 'hide-border': isEditingDescription, 'show-border': !isEditingDescription }">
            <div class="edit-box">
              <div class="box-container">
                <div class="header-button-box">
                  <label for="description" [ngClass]="{ 'move-left': isEditingDescription }">Beschreibung</label>
                  <div (click)="toggleEditingDescription()" class="profil-settings-button"
                       [ngClass]="{ 'move-right': isEditingDescription, 'move-initial': !isEditingDescription }">
                    {{ isEditingDescription ? 'Speichern' : 'Bearbeiten' }}
                  </div>
                </div>
  
                <div class="channel-name-box">
                    <h1 *ngIf="!isEditingDescription">{{ description }}</h1>  <!-- Originale Beschreibung wird angezeigt, wenn nicht bearbeitet wird -->
                    <input *ngIf="isEditingDescription"
                           id="channel-description"
                           [(ngModel)]="editedDescription"
                           placeholder="Dein Text hier"
                           class="visible" />
                  </div>
          <div class="seperator"></div>

          <!-- Info Box -->
        </div>
      </div>
      <div class="info-box">
        <p>Erstellt von</p>
        <strong>{{ createdBy }}</strong>
      </div>
    </div>
  
    <!-- Dialog Actions -->
    <div class="mat-dialog-actions">
      <button class="primary-button" (click)="onSave()">Channel verlassen</button>
    </div>
  </div>
