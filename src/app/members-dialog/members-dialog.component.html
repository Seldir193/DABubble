<div class="container" >
    <div class="close-dialog">
      <h1 mat-dialog-title>Leute hinzufügen</h1>
      <img (click)="onCancel()" src="assets/img/close.png" alt="Schließen">
    </div>
  
    <div mat-dialog-content>
      <div class="member-selection">
        
        
        <div class="option">
          <input type="radio" id="allMembers" name="memberSelection" value="all" [(ngModel)]="selectedOption">
          <label for="allMembers">Alle Mitglieder</label>
        </div>
  
        <div class="option">
          <input type="radio" id="specificMembers" name="memberSelection" value="specific" [(ngModel)]="selectedOption">
          <label for="specificMembers">Bestimmte Mitglieder</label>
        </div>

        <div *ngIf="selectedOption === 'specific'" class="specific-members">

            <input type="text"
             id="specificMemberInput"
             [(ngModel)]="specificMemberName"
             placeholder="Name eingeben" 
             (focus)="showAllMembers()" 
             (input)="onSearchMembers()"
             (focus)="disableButton()" 
            (blur)="enableButton()"
            autocomplete="off"
            cdkOverlayOrigin #trigger="cdkOverlayOrigin"
            >

            <ng-template
      cdkConnectedOverlay
      [cdkConnectedOverlayOrigin]="trigger"
      [cdkConnectedOverlayOpen]="filteredMembers.length > 0"
      [cdkConnectedOverlayHasBackdrop]="false"
      [cdkConnectedOverlayPositions]="[
        { originX: 'start', originY: 'bottom', overlayX: 'start', overlayY: 'top' }
      ]"
    >
            <ul *ngIf="filteredMembers.length > 0" class="dropdown-list scrollable-area"  >
              <li *ngFor="let member of filteredMembers" (click)="selectMember(member)" >
                <img [src]="member.avatarUrl" alt="{{member.name}}" class="avatar"> 
                {{ member.name }}
              </li>
            </ul>
          </ng-template>

          <div *ngIf="selectedMembers.length > 0" class="selected-member">
            <img [src]="selectedMembers[0].avatarUrl" alt="{{selectedMembers[0].name}}" class="avatar">
            <span>{{ selectedMembers[0].name }}</span>
            
            <!-- Verwende selectedMembers[0], um das erste Mitglied zu entfernen -->
            <button class="remove-btn" (click)="removeMember(selectedMembers[0])">×</button>
          
            <!-- Zähler anzeigen, wenn mehr als 1 Mitglied ausgewählt ist -->
            <div *ngIf="selectedMembers.length > 1" class="more-members" (click)="openMembersDialog()">
              +{{ selectedMembers.length - 1 }}
            </div>
          </div>
        
          </div>
      </div>
    </div>
  
    <div mat-dialog-actions class="button-box">
      <button class="primary-button" (click)="onCreate()" [disabled]="isButtonDisabled">Erstellen</button>
    </div>

    
  </div>
